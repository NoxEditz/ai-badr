<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#020c04" />
  <title>بدر AI — مساعدك الذكي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   استايلك الأصلي (ممنوع اللمس)
   ═══════════════════════════════════════════════════ */
:root {
  --bg0:        #020c04;
  --bg1:        #041208;
  --bg2:        #071a0a;
  --bg3:        #0a2010;
  --card:       #081509;
  --ng:         #00ff41;
  --txt0:       #e2ffe6;
  --border:     rgba(0,255,65,.12);
  --radius:     14px;
  --font-ui:    'Cairo', sans-serif;
  --font-hd:    'Orbitron', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg0); color: var(--txt0); overflow: hidden; height: 100dvh; }
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15; }

/* ═══════════════════════════════════════════════════
   استايل الـ Swipe الجديد (مودرن ونيون)
   ═══════════════════════════════════════════════════ */
#unlock-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
}

.unlock-container {
  width: 300px; height: 60px;
  background: rgba(0, 255, 65, 0.05);
  border: 1px solid var(--border);
  border-radius: 50px;
  position: relative;
  display: flex; align-items: center;
  padding: 5px; overflow: hidden;
  box-shadow: 0 0 20px rgba(0, 255, 65, 0.05);
}

.unlock-text {
  width: 100%; text-align: center;
  color: var(--ng); font-weight: 700; letter-spacing: 1px;
  opacity: 0.5; user-select: none;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

#swipe-handle {
  width: 50px; height: 50px;
  background: var(--ng);
  border-radius: 50px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; position: absolute; left: 5px; z-index: 2;
  box-shadow: 0 0 15px var(--ng);
  transition: transform 0.1s ease;
}

#swipe-handle:active { cursor: grabbing; }

/* ═══════════════════════════════════════════════════
   باقي استايل الموقع (الـ Layout والـ Chat)
   ═══════════════════════════════════════════════════ */
#app { position: fixed; inset: 0; display: flex; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
#app.active { opacity: 1; pointer-events: auto; }
.hidden { display: none !important; }

/* ... (باقي الـ CSS بتاعك بيفضل شغال عادي) ... */
#main { flex: 1; display: flex; flex-direction: column; }
#messages-container { flex: 1; overflow-y: auto; padding: 20px; }
#input-area { padding: 15px; background: var(--bg1); border-top: 1px solid var(--border); }
</style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="unlock-screen">
    <h1 style="font-family: var(--font-hd); color: var(--ng); margin-bottom: 40px; font-size: 2.5rem; text-shadow: 0 0 20px var(--ng);">BADR AI</h1>
    <div class="unlock-container">
        <div class="unlock-text">اسحب للفتح</div>
        <div id="swipe-handle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="black"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </div>
    </div>
  </div>

  <div id="app">
    <main id="main" style="width: 100%;">
        <div id="messages-container">
            <div id="messages-list"></div>
        </div>
        <div id="input-area">
            <div style="display:flex; gap:10px;">
                <textarea id="user-input" style="flex:1; background:var(--bg2); color:white; border:1px solid var(--border); padding:10px; border-radius:8px; resize:none;" placeholder="اسأل بدر..."></textarea>
                <button id="send-btn" style="background:var(--ng); color:black; border:none; padding:0 20px; border-radius:8px; font-weight:bold; cursor:pointer;">إرسال</button>
            </div>
        </div>
    </main>
  </div>

  <script type="module">
    import { streamChat, Storage } from './chat.js';

    const $ = id => document.getElementById(id);
    const $handle = $('swipe-handle');
    const $unlockScreen = $('unlock-screen');
    const $app = $('app');

    // ═══════════════════════════════════════════════════
    // منطق الـ Swipe (اسحب لفتح الموقع)
    // ═══════════════════════════════════════════════════
    let isDragging = false;
    let startX = 0;
    const maxSlide = 240; // المسافة اللي هيمشيها الزرار

    function startDrag(e) {
      isDragging = true;
      startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    }

    function moveDrag(e) {
      if (!isDragging) return;
      const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      let move = x - startX;
      if (move < 0) move = 0;
      if (move > maxSlide) move = maxSlide;
      
      $handle.style.transform = `translateX(${move}px)`;
      
      // لو وصل للأخر افتح الموقع
      if (move >= maxSlide) {
        unlockApp();
      }
    }

    function stopDrag() {
      if (!isDragging) return;
      isDragging = false;
      if (parseInt($handle.style.transform.replace('translateX(', '')) < maxSlide) {
        $handle.style.transform = `translateX(0px)`;
      }
    }

    function unlockApp() {
      $unlockScreen.style.opacity = '0';
      setTimeout(() => {
        $unlockScreen.style.display = 'none';
        $app.classList.add('active');
        initChat();
      }, 500);
    }

    $handle.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', stopDrag);
    
    $handle.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', moveDrag);
    window.addEventListener('touchend', stopDrag);

    // ═══════════════════════════════════════════════════
    // منطق الـ Chat (مربوط بالـ Backend في Vercel)
    // ═══════════════════════════════════════════════════
    let state = { chats: Storage.loadChats(), activeId: null, streaming: false };

    function initChat() {
      if (state.chats.length === 0) {
        state.activeId = Date.now();
        state.chats.push({ id: state.activeId, messages: [] });
      } else {
        state.activeId = state.chats[state.chats.length - 1].id;
      }
      renderMessages();
    }

    async function sendMessage() {
      const text = $('user-input').value.trim();
      if (!text || state.streaming) return;

      const chat = state.chats.find(c => c.id === state.activeId);
      chat.messages.push({ role: 'user', content: text });
      $('user-input').value = '';
      
      const assistantMsg = { role: 'assistant', content: '' };
      chat.messages.push(assistantMsg);
      renderMessages();

      state.streaming = true;
      try {
        const stream = streamChat({ messages: chat.messages });
        for await (const chunk of stream) {
          assistantMsg.content += chunk;
          renderMessages();
        }
      } catch (err) {
        assistantMsg.content = "⚠️ في مشكلة في الـ Vercel Backend.. اتأكد إنك حطيت الـ API Key في الـ Environment Variables.";
        renderMessages();
      } finally {
        state.streaming = false;
        Storage.saveChats(state.chats);
      }
    }

    function renderMessages() {
      const chat = state.chats.find(c => c.id === state.activeId);
      $('messages-list').innerHTML = chat.messages.map(m => `
        <div style="margin-bottom:15px; text-align:${m.role === 'user' ? 'left' : 'right'}">
          <div style="display:inline-block; padding:10px; border-radius:10px; background:${m.role === 'user' ? '#003f10' : 'var(--card)'}; border:1px solid var(--border);">
            ${m.content}
          </div>
        </div>
      `).join('');
      $('messages-container').scrollTop = $('messages-container').scrollHeight;
    }

    $('send-btn').addEventListener('click', sendMessage);
  </script>
</body>
</html>
