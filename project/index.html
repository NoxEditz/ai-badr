<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#020c04" />
  <title>بدر AI — مساعدك الذكي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   ROOT & ORIGINAL STYLE (حافظت على كل ألوانك)
   ═══════════════════════════════════════════════════ */
:root {
  --bg0: #020c04; --bg1: #041208; --bg2: #071a0a; --bg3: #0a2010;
  --card: #081509; --ng: #00ff41; --txt0: #e2ffe6;
  --border: rgba(0,255,65,.12); --font-ui: 'Cairo', sans-serif; --font-hd: 'Orbitron', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-ui); background: var(--bg0); color: var(--txt0); overflow: hidden; height: 100dvh; }
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15; }

/* ═══════════════════════════════════════════════════
   SWIPE TO UNLOCK STYLE
   ═══════════════════════════════════════════════════ */
#unlock-screen {
  position: fixed; inset: 0; z-index: 9999; background: var(--bg0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
}
.unlock-container {
  width: 280px; height: 60px; background: rgba(0, 255, 65, 0.05);
  border: 1px solid var(--border); border-radius: 50px;
  position: relative; display: flex; align-items: center; padding: 5px; overflow: hidden;
}
.unlock-text {
  width: 100%; text-align: center; color: var(--ng); font-weight: 700;
  opacity: 0.5; user-select: none; animation: pulse 2s infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
#swipe-handle {
  width: 50px; height: 50px; background: var(--ng); border-radius: 50px;
  display: flex; align-items: center; justify-content: center;
  cursor: grab; position: absolute; left: 5px; z-index: 2;
  box-shadow: 0 0 15px var(--ng); transition: transform 0.1s ease;
}

/* ═══════════════════════════════════════════════════
   APP LAYOUT (شيلنا شاشة الـ Setup القديمة)
   ═══════════════════════════════════════════════════ */
#app { position: fixed; inset: 0; display: flex; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; z-index: 10; }
#app.active { opacity: 1; pointer-events: auto; }
#main { flex: 1; display: flex; flex-direction: column; background: var(--bg0); }
#messages-container { flex: 1; overflow-y: auto; padding: 20px; }
#input-area { padding: 15px; background: var(--bg1); border-top: 1px solid var(--border); }
.hidden { display: none !important; }
</style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="unlock-screen">
    <h1 style="font-family: var(--font-hd); color: var(--ng); margin-bottom: 30px; text-shadow: 0 0 15px var(--ng);">BADR AI</h1>
    <div class="unlock-container">
        <div class="unlock-text">اسحب للدخول</div>
        <div id="swipe-handle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="black"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </div>
    </div>
  </div>

  <div id="app">
    <main id="main">
      <div id="messages-container">
        <div id="messages-list"></div>
      </div>
      <div id="input-area">
        <div style="display:flex; gap:10px; max-width: 800px; margin: 0 auto; width: 100%;">
          <textarea id="user-input" style="flex:1; background:var(--bg2); color:white; border:1px solid var(--border); padding:12px; border-radius:10px; resize:none; outline:none;" placeholder="اسأل بدر AI..."></textarea>
          <button id="send-btn" style="background:var(--ng); color:black; border:none; padding:0 25px; border-radius:10px; font-weight:bold; cursor:pointer;">إرسال</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { streamChat, Storage } from './chat.js';

    // 1. منطق الـ Swipe (سهل وسلس)
    const $handle = document.getElementById('swipe-handle');
    let isDragging = false;
    let startX = 0;
    const maxSlide = 220;

    const startDrag = e => { isDragging = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; };
    const moveDrag = e => {
      if (!isDragging) return;
      const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      let move = Math.max(0, Math.min(x - startX, maxSlide));
      $handle.style.transform = `translateX(${move}px)`;
      if (move >= maxSlide) unlock();
    };
    const unlock = () => {
      document.getElementById('unlock-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('unlock-screen').classList.add('hidden');
        document.getElementById('app').classList.add('active');
        init();
      }, 500);
    };
    window.addEventListener('mousemove', moveDrag); window.addEventListener('mouseup', () => { isDragging = false; if (parseInt($handle.style.transform.replace('translateX(','')) < maxSlide) $handle.style.transform = 'translateX(0)'; });
    $handle.addEventListener('mousedown', startDrag); $handle.addEventListener('touchstart', startDrag); window.addEventListener('touchmove', moveDrag);

    // 2. الشات (بدون أي طلب للـ API Key)
    let state = { chats: Storage.loadChats(), activeId: Date.now(), streaming: false };

    function init() {
      if (state.chats.length === 0) state.chats.push({ id: state.activeId, messages: [] });
      else state.activeId = state.chats[state.chats.length-1].id;
      render();
    }

    async function send() {
      const text = document.getElementById('user-input').value.trim();
      if (!text || state.streaming) return;

      const chat = state.chats.find(c => c.id === state.activeId);
      chat.messages.push({ role: 'user', content: text });
      document.getElementById('user-input').value = '';
      
      const aiMsg = { role: 'assistant', content: '' };
      chat.messages.push(aiMsg);
      render();

      state.streaming = true;
      try {
        const stream = streamChat({ messages: chat.messages });
        for await (const chunk of stream) {
          aiMsg.content += chunk;
          render();
        }
      } catch (err) {
        aiMsg.content = "⚠️ السيرفر مش بيرد، اتأكد إنك حطيت الـ Key في Vercel Settings.";
        render();
      } finally {
        state.streaming = false;
        Storage.saveChats(state.chats);
      }
    }

    function render() {
      const chat = state.chats.find(c => c.id === state.activeId);
      document.getElementById('messages-list').innerHTML = chat.messages.map(m => `
        <div style="margin-bottom:20px; display:flex; justify-content:${m.role === 'user' ? 'flex-start' : 'flex-end'}">
          <div style="padding:12px 16px; border-radius:15px; background:${m.role === 'user' ? '#003f10' : 'var(--card)'}; border:1px solid var(--border); max-width:80%;">
            ${m.content}
          </div>
        </div>
      `).join('');
      document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
    }

    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('user-input').addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
  </script>
</body>
</html>
