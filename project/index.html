<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>

<style>
/* 1. حط هنا كل الـ CSS الـ 1000 سطر بتوعك (أنا هكتبلك الخلاصة عشان تفتح) */
:root { --bg0: #020c04; --ng: #00ff41; --border: rgba(0,255,65,.12); }
body { background: var(--bg0); color: white; font-family: 'Cairo'; margin: 0; overflow: hidden; }

/* إجبار إخفاء شاشة الـ Setup القديمة */
#setup-screen, .setup-card, #api-key-input-container { display: none !important; visibility: hidden !important; }

/* استايل الـ Swipe الجديد */
#swipe-unlock-overlay {
  position: fixed; inset: 0; z-index: 10000; background: var(--bg0);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.swipe-track {
  width: 280px; height: 60px; background: rgba(0,255,65,0.05);
  border: 1px solid var(--border); border-radius: 50px; position: relative;
  display: flex; align-items: center; padding: 5px;
}
#swipe-ball {
  width: 50px; height: 50px; background: var(--ng); border-radius: 50px;
  cursor: grab; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 15px var(--ng); z-index: 10;
}
.swipe-text { position: absolute; width: 100%; text-align: center; color: var(--ng); opacity: 0.5; pointer-events: none; }

/* الموقع بتاعك هيكون مخفي ورا الـ Swipe */
#app { opacity: 0; transition: opacity 0.5s; }
#app.visible { opacity: 1; }
</style>
</head>
<body>

  <div id="swipe-unlock-overlay">
    <h1 style="font-family: 'Orbitron'; color: var(--ng); margin-bottom: 30px;">BADR AI</h1>
    <div class="swipe-track">
      <div class="swipe-text">اسحب لليمين للفتح</div>
      <div id="swipe-ball">
        <svg width="25" height="25" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </div>
    </div>
  </div>

  <div id="app">
      </div>

<script type="module">
  // استيراد الدوال من ملف chat.js الجديد (اللي بيكلم Vercel)
  import { streamChat, Storage } from './chat.js';

  // منطق السحب (Swipe Logic)
  const ball = document.getElementById('swipe-ball');
  const overlay = document.getElementById('swipe-unlock-overlay');
  const app = document.getElementById('app');
  let isDragging = false;
  let startX = 0;

  ball.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    let x = e.clientX - startX;
    if (x < 0) x = 0;
    if (x > 220) x = 220;
    ball.style.transform = `translateX(${x}px)`;
    if (x >= 220) {
      overlay.style.display = 'none';
      app.classList.add('visible');
      startApp(); // تشغيل كود الموقع بتاعك
    }
  });
  window.addEventListener('mouseup', () => { isDragging = false; ball.style.transform = 'translateX(0)'; });

  // تشغيل الموقع (ده بديل الـ init القديم اللي كان بيفتح الـ Setup)
  function startApp() {

  }

    if (!text) return;

  }
</script>
</body>
</html>
